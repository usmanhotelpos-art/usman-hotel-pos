[build]
  command = "npm install --workspaces && npm run build:client"
  publish = "client/dist"

  [build.environment]
    VITE_API_BASE = "https://usman-hotel-pos-server-production.up.railway.app/api"
    NODE_VERSION = "24"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
